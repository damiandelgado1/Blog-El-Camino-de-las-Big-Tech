<select>
    {% for blog in blogs %}
        <option> {{ blog.category }} </option>
    {% endfor %}
</select>

<a href="{% url 'blog:create_blog' %}">Crear nuevo Blog</a>

{% for blog in blogs %}

    <article>
        <h3> {{ blog.name }} </h3>
        <img src="{{ blog.image }}"></img>
        <p> Categoria: {{ blog.category }} </p>
        <p> Fecha de Creacion: {{ blog.created_at }} </p>
        <a href="{% url 'blog:blog_detail' blog.pk %}">Ver Mas</a>
    </article>

{% endfor%}
