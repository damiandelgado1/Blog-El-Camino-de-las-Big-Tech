{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&family=Akronim&family=GFS+Didot&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'home/css/style.css' %}">

<article>
    <h3> {{ blog.name }} </h3>
    <img src="{{ blog.image.url }}" width="300"></img>
    <p> Categoria: {{ blog.category }} </p>
    <p class="content-blog"> {{ blog.content|linebreaksbr }} </p>
    <p> Fecha de Creacion: {{ blog.created_at }} </p>
    <a href="{% url 'blog:delete_blog' blog.pk %}">Eliminar el Blog</a>
    <a href="{% url 'home' %}">Volver al Inicio</a>
</article>
